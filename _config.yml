# Site Settings
remote_theme             : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "dirt"

locale                   : "de"
title                    : "Jens Rehsack"
title_separator          : "-"
subtitle                 : "Softwarearchitekt · Alfista · Gärtner ohne Zeit"
url                      : "https://rehsack.de"
baseurl                  :
repository               : "rehsack/rehsack.de"
description              : "Persönlicher Blog von Jens Rehsack — Technik, Meinung, Leben"
permalink                : pretty

# Site Author
author:
  name   : "Jens Rehsack"
  location : "Kerpen, Germany"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/rehsack"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/jens-rehsack-14108926"
    - label: "rehsack.dev"
      icon: "fas fa-fw fa-code"
      url: "https://rehsack.dev"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/rehsack"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/jens-rehsack-14108926"
    - label: "rehsack.dev (EN/Tech)"
      icon: "fas fa-fw fa-code"
      url: "https://rehsack.dev"

# Reading Files
include:
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - README.md
  - CLAUDE.md
  - docker-compose.yml
  - tmp
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-asciidoc

# AsciiDoc
asciidoc:
  attributes:
    source-highlighter: rouge

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "single"
      sidebar: false
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "single"
      read_time: true
      share: true
      license: "CC BY-NC-SA 4.0"
  - scope:
      path: ""
      type: "posts"
    values:
      gallery_layout: "grid"
